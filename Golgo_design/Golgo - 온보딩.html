<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Golgo · 고르고 · 온보딩</title>
  <link rel="stylesheet" href="src/theme.css" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background: #0B0D11;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% 0%, rgba(99,102,241,.06), transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(20,184,166,.05), transparent 60%);
      font-family: 'Spoqa Han Sans Neo', -apple-system, system-ui, sans-serif;
      color: #e4e6ea;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .stage {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      position: relative;
    }
    .caption {
      position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 10px;
      color: rgba(255,255,255,.5);
      font: 500 12px/1 'Spoqa Han Sans Neo', system-ui, sans-serif;
      letter-spacing: 0.04em;
      z-index: 50;
    }
    .caption b { color: rgba(255,255,255,.85); font-weight: 600; }
    .caption .dot { width: 4px; height: 4px; border-radius: 999px; background: rgba(255,255,255,.3); }
  </style>
</head>
<body>
  <div class="caption">
    <b>Golgo · 고르고</b>
    <span class="dot"></span>
    <span>4단계 온보딩 플로우</span>
  </div>

  <div id="app"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="src/data.js"></script>
  <script type="text/babel" src="src/ios-frame.jsx"></script>
  <script type="text/babel" src="src/tweaks-panel.jsx"></script>
  <script type="text/babel" src="src/brand-mark.jsx"></script>
  <script type="text/babel" src="src/components.jsx"></script>

  <!-- shared step 2 (persona) — already exists in main app -->
  <script type="text/babel" src="src/screens/onboarding.jsx"></script>

  <!-- new onboarding steps -->
  <script type="text/babel" src="src/onboarding/nickname.jsx"></script>
  <script type="text/babel" src="src/onboarding/broker.jsx"></script>
  <script type="text/babel" src="src/onboarding/targets.jsx"></script>

  <!-- orchestrator -->
  <script type="text/babel" src="src/onboarding/app.jsx"></script>
</body>
</html>
