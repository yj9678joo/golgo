spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:backend/.env[.properties]
  application:
    name: golgo
  profiles:
    default: local
  threads:
    virtual:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        show_sql: false
        use_sql_comments: true
        default_batch_fetch_size: 100
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  batch:
    job:
      enabled: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
            client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/auth/{registrationId}/callback"
          naver:
            client-id: ${NAVER_OAUTH_CLIENT_ID:}
            client-secret: ${NAVER_OAUTH_CLIENT_SECRET:}
            authorization-grant-type: authorization_code
            scope:
              - name
              - email
              - profile_image
            client-name: Naver
            redirect-uri: "{baseUrl}/auth/{registrationId}/callback"
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

server:
  servlet:
    context-path: /api
  port: 8099

springdoc:
  swagger-ui:
    path: /swagger-ui.html

jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD:}

golgo:
  frontend:
    auth-callback-url: ${FRONTEND_AUTH_CALLBACK_URL:http://localhost:3000/auth/callback}
  screenshot:
    storage-dir: ${GOLGO_SCREENSHOT_STORAGE_DIR:./data/screenshots}
    parser: ${GOLGO_SCREENSHOT_PARSER:gemini}
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-2.5-flash}
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
  jwt:
    access-token-validity-seconds: ${JWT_ACCESS_TOKEN_VALIDITY_SECONDS:900}
    refresh-token-validity-seconds: ${JWT_REFRESH_TOKEN_VALIDITY_SECONDS:604800}
    secret: ${JWT_SECRET:}

logging:
  level:
    "[org.hibernate.SQL]": debug
    "[org.hibernate.orm.jdbc.bind]": trace
